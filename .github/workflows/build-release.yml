name: Build And Package

on:
  workflow_dispatch:

jobs:
  build-test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Test
        shell: bash
        run: ./mvnw test

  package:
    name: Package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: academic-tracker-linux
            package-command: ./packaging/linux/package-linux.sh
          - os: macos-latest
            artifact-name: academic-tracker-macos
            package-command: ./packaging/macos/package-macos.sh
          - os: windows-latest
            artifact-name: academic-tracker-windows
            package-command: powershell -ExecutionPolicy Bypass -File ./packaging/windows/package-windows.ps1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Ensure shell scripts are executable
        if: runner.os != 'Windows'
        run: chmod +x mvnw run.sh test.sh scripts/*.sh packaging/**/*.sh

      - name: Package on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\packaging\windows\package-windows.ps1

      - name: Package on macOS/Linux
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.package-command }}

      - name: Upload dist artifacts for Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            dist/windows/*.zip
            dist/windows/*.exe
            dist/windows/*.msi
          if-no-files-found: error

      - name: Upload dist artifacts for macOS/Linux
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/**
          if-no-files-found: error
